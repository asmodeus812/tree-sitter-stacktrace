name: CI

on:
  push:
  pull_request:

jobs:
  parse-examples:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli@0.25.3

      - name: Verify parser with examples
        run: make parse-examples
